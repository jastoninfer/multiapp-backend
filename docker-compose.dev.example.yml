services:
  postgres:
    ports:
      - "${PG_PORT:-5432}:5432"

  keycloak:
    ports:
      - "${KC_PORT:-8080}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    command: ["start-dev", "--import-realm"]
    volumes:
      - ${PWD}/keycloak/import:/opt/keycloak/data/import:ro
      - ${PWD}/keycloak/themes:/opt/keycloak/themes:ro