name: Backend CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven tests
        run: ./mvnw -B test

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t multiapp-backend:${{ github.sha }} .

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 20

    steps:
      - name: Check required settings
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          test -n "$VPS_APP_DIR"

      - name: Install SSH key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/multiapp_vps
          chmod 600 ~/.ssh/multiapp_vps
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Restart Docker Compose stack
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          ssh -i ~/.ssh/multiapp_vps -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" <<EOF
          set -euo pipefail
          cd "$VPS_APP_DIR"
          git fetch --prune origin
          git checkout main
          git pull --ff-only origin main
          docker compose --env-file .env.demo-prod -f docker-compose.yml -f docker-compose.demo-prod.yml up -d --build
          docker compose --env-file .env.demo-prod -f docker-compose.yml -f docker-compose.demo-prod.yml ps
          EOF

      - name: Smoke test deployed API
        env:
          BACKEND_HEALTH_URL: ${{ vars.BACKEND_HEALTH_URL }}
        run: |
          test -n "$BACKEND_HEALTH_URL"
          curl --retry 10 --retry-delay 5 --retry-all-errors -fsS "$BACKEND_HEALTH_URL"
